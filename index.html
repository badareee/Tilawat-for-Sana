<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilawat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #4f46e5, #7c3aed);
    top: -120px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #0ea5e9, #06b6d4);
    bottom: -100px; right: -80px;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 340px;
    padding: 56px 40px 44px;
    border-radius: 28px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    text-align: center;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(139,92,246,0.6), transparent);
  }

  .icon-wrap {
    width: 56px; height: 56px;
    margin: 0 auto 28px;
    border-radius: 16px;
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg {
    width: 26px; height: 26px;
    stroke: #a78bfa;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f1f0ff;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s ease;
    border: none;
    outline: none;
    background: rgba(14,165,233,0.1);
    border: 1px solid rgba(14,165,233,0.2);
    color: #7dd3fc;
  }

  .btn:hover {
    background: rgba(14,165,233,0.18);
    border-color: rgba(14,165,233,0.45);
    color: #e0f2fe;
    transform: translateY(-2px);
  }

  .btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 32px 0 24px;
  }

  .status {
    font-size: 11px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.1em;
  }

  .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(139,92,246,0.5);
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13M9 18c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
    </svg>
  </div>

  <h1>Tilawat</h1>
  <p class="subtitle">Quran Recitation</p>

  <a class="btn"
     href="Tilawat.mp3"
     download="Tilawat.mp3">
    <svg viewBox="0 0 24 24">
      <path d="M15 10l-4 4-4-4m4 4V3M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/>
    </svg>
    Download Audio
  </a>

  <div class="divider"></div>
  <p class="status"><span class="dot"></span>Ready to download</p>
</div>

</body>
</html>
